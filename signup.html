<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArborPro — Sign Up</title>
  <meta name="description" content="Create your ArborPro account. Manage tree care consultations and services.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>

  <div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 py-5 position-relative" style="background: var(--tertiary-dark);">
    <div class="position-absolute top-0 end-0 p-3 d-flex gap-2" style="z-index: 20;">
      <button class="theme-toggle btn-sm btn btn-outline-custom p-0 d-flex align-items-center justify-content-center" id="themeToggle" style="width:36px; height:36px;"><i class="bi bi-moon-fill"></i></button>
      <button class="btn btn-sm btn-outline-custom p-0 d-flex align-items-center justify-content-center" id="rtlToggle" style="width:36px; height:36px; font-size:0.75rem;">RTL</button>
    </div>
    <div class="auth-card border-0" style="background: var(--surface); box-shadow: 0 30px 60px rgba(0,0,0,0.15);">
      <div class="text-center mb-4">
        <a class="navbar-brand d-inline-flex align-items-center justify-content-center text-decoration-none" href="index.html" style="font-family: var(--font-heading); font-size: 1.6rem; font-weight: 700; color: var(--primary); gap: 10px;">
          <img src="assets/img/favicon.png" alt="ArborPro Logo" class="brand-logo-img" style="height: 32px; width: auto;">
          <span>ArborPro</span>
        </a>
      </div>

      <div class="text-center mb-4">
        <h2 class="fw-bold h3 mb-1">Create Account</h2>
        <p class="text-muted small">Join our community of tree lovers.</p>
      </div>

      <form>
        <div class="mb-3">
          <label class="form-label small fw-bold">Full Name</label>
          <input type="text" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Email Address</label>
          <input type="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Password</label>
          <div class="position-relative">
            <input type="password" class="form-control pe-5" id="passwordInput" placeholder="Create a password" required>
            <button type="button" class="btn border-0 position-absolute top-50 end-0 translate-middle-y me-2 text-muted shadow-none toggle-password-btn" style="background: transparent;">
              <i class="bi bi-eye eye-icon"></i>
            </button>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold">Confirm Password</label>
          <div class="position-relative">
            <input type="password" class="form-control pe-5" id="confirmPasswordInput" placeholder="Confirm your password" required>
            <button type="button" class="btn border-0 position-absolute top-50 end-0 translate-middle-y me-2 text-muted shadow-none toggle-password-btn" style="background: transparent;">
              <i class="bi bi-eye eye-icon"></i>
            </button>
          </div>
        </div>
        
        <div class="form-check mb-4">
          <input type="checkbox" class="form-check-input" id="agree" required>
          <label class="form-check-label small" for="agree">I agree to the <a href="#" class="text-primary-custom fw-bold text-decoration-none">Terms</a> and <a href="#" class="text-primary-custom fw-bold text-decoration-none">Privacy</a></label>
        </div>

        <div class="text-center mb-4">
          <button type="submit" class="btn btn-primary-custom w-100 py-2 rounded fw-bold">Create Account</button>
        </div>
      </form>

      <div class="divider"><span>OR SIGN UP WITH</span></div>

       <div class="social-login mb-4 d-flex flex-column align-items-center gap-2 w-100">
         <a href="#" class="btn btn-outline-custom w-100 py-2 rounded fw-semibold d-flex align-items-center justify-content-center gap-2" style="font-size: 0.85rem;" title="Google"><i class="bi bi-google" style="color: #DB4437;"></i> Continue with Google</a>
         <a href="#" class="btn btn-outline-custom w-100 py-2 rounded fw-semibold d-flex align-items-center justify-content-center gap-2" style="font-size: 0.85rem;" title="Apple"><i class="bi bi-apple"></i> Continue with Apple</a>
         <a href="#" class="btn btn-outline-custom w-100 py-2 rounded fw-semibold d-flex align-items-center justify-content-center gap-2" style="font-size: 0.85rem;" title="Facebook"><i class="bi bi-facebook" style="color: #4267B2;"></i> Continue with Facebook</a>
       </div>

      <div class="text-center small mt-4">
        Already have an account? <a href="login.html" class="text-primary-custom fw-bold text-decoration-none">Login</a>
      </div>
    </div>
  </div>

  <!-- Fixed RTL Toggle Button (Top-Right Corner) -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top"><i class="bi bi-chevron-up"></i></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
