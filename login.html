<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArborPro — Login</title>
  <meta name="description" content="Login to your ArborPro account to manage tree care services and consultations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>
  <div class="auth-wrapper d-flex align-items-center justify-content-center min-vh-100 py-5" style="background: var(--tertiary-dark);">
    <div class="auth-card position-relative border-0" style="background: var(--surface); box-shadow: 0 30px 60px rgba(0,0,0,0.15);">
      <!-- Auth Toggles Inner -->
      <div class="d-flex gap-2 position-absolute" style="top: 20px; right: 20px;">
        <button class="theme-toggle btn-sm btn btn-outline-custom p-0 d-flex align-items-center justify-content-center" id="themeToggle" style="width:36px; height:36px;"><i class="bi bi-moon-fill"></i></button>
        <button class="btn btn-sm btn-outline-custom p-0 d-flex align-items-center justify-content-center" id="rtlToggle" style="width:36px; height:36px; font-size:0.75rem;">RTL</button>
      </div>

      <div class="text-center mb-4">
        <a class="navbar-brand d-inline-flex align-items-center justify-content-center text-decoration-none" href="index.html" style="font-family: var(--font-heading); font-size: 1.6rem; font-weight: 700; color: var(--primary); gap: 10px;">
          <img src="assets/img/favicon.png" alt="ArborPro Logo" class="brand-logo-img" style="height: 32px; width: auto;">
          <span>ArborPro</span>
        </a>
      </div>

      <div class="text-center mb-4">
        <h2 class="fw-bold h3 mb-1">Welcome Back</h2>
        <p class="text-muted small">Please enter your details to sign in.</p>
      </div>

      <form>
        <div class="mb-3">
          <label class="form-label small fw-bold">Email Address</label>
          <input type="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold">Password</label>
          <input type="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-label form-check-label small mb-0" for="remember">Remember me</label>
          </div>
          <a href="#" class="small text-primary-custom text-decoration-none fw-bold">Forgot password?</a>
        </div>
        <div class="text-center mb-4">
          <button type="submit" class="btn btn-primary-custom py-3 px-5 rounded-pill fw-bold">Sign In</button>
        </div>
      </form>

      <div class="divider"><span>OR CONTINUE WITH</span></div>

      <div class="social-login mb-4">
        <a href="#" class="btn btn-outline-light border rounded-pill flex-grow-1 py-2"><i class="bi bi-google text-dark"></i></a>
        <a href="#" class="btn btn-outline-light border rounded-pill flex-grow-1 py-2"><i class="bi bi-apple text-dark"></i></a>
        <a href="#" class="btn btn-outline-light border rounded-pill flex-grow-1 py-2"><i class="bi bi-facebook text-dark"></i></a>
      </div>

      <div class="text-center small mt-4">
        Don't have an account? <a href="signup.html" class="text-primary-custom fw-bold text-decoration-none">Sign up</a>
      </div>
    </div>
  </div>

  <button class="back-to-top" id="backToTop" aria-label="Back to top"><i class="bi bi-chevron-up"></i></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
