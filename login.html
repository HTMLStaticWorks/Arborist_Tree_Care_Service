<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArborPro — Login</title>
  <meta name="description" content="Login to your ArborPro account to manage tree care services and consultations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
</head>
<body>
  <!-- RTL and Dark Mode Icons at Top-Right -->
  <div class="auth-top-icons">
    <button class="btn btn-outline-custom" id="rtlToggle">RTL</button>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <i class="bi bi-moon-fill"></i>
    </button>
  </div>

  <!-- LOGIN FORM -->
  <div class="container-fluid p-0">
    <div class="row g-0 min-vh-100 flex-column-reverse flex-lg-row">
      <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
        <div class="auth-card" style="box-shadow:none;border:none;">
          <div class="text-center mb-2">
            <a href="index.html" class="text-decoration-none">
                <img src="assets/img/favicon.png" alt="ArborPro Logo" class="brand-logo-img mb-3" style="height: 64px; width: auto;">
                <h4 class="fw-bold mt-2" style="color: var(--text);">ArborPro</h4>
            </a>
          </div>
          <h2 class="text-center fw-bold" style="color: var(--text);">Welcome Back</h2>
          <p class="auth-subtitle text-center fw-medium" style="color: var(--text);">Sign in to your account</p>
          <form>
            <div class="mb-3">
              <label class="form-label fw-bold" style="color: var(--text);">Email Address</label>
              <input type="email" class="form-control" placeholder="you@example.com" id="loginEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold" style="color: var(--text);">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" placeholder="Enter your password" id="loginPassword" required>
                <button class="btn border password-toggle" type="button" style="border-color:var(--border);"><i class="bi bi-eye"></i></button>
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe" style="font-size:.9rem; color: var(--text);">Remember me</label>
              </div>
              <a href="#" class="text-primary hover-underline" style="font-size:.9rem;font-weight:700;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 justify-content-center">
              Login to Account
            </button>
          </form>
          <div class="divider"><span>or continue with</span></div>
          <div class="social-login">
            <a href="#" title="Google" class="text-danger border-danger-subtle"><i class="bi bi-google"></i></a>
            <a href="#" title="Apple" class="border-dark-subtle" style="color: var(--text);"><i class="bi bi-apple"></i></a>
            <a href="#" title="Facebook" class="text-primary border-primary-subtle"><i class="bi bi-facebook"></i></a>
          </div>
          <p class="text-center mt-4 mb-0" style="font-size:.95rem; color: var(--text);">
            Don't have an account? <a href="signup.html" class="text-primary fw-bold hover-underline">Sign Up</a>
          </p>
        </div>
      </div>
      <div class="col-lg-6 auth-split-img">
        <div class="text-center fade-in-up" style="max-width:400px;">
          <i class="bi bi-quote fs-1 text-secondary-custom"></i>
          <h3 class="fw-bold text-white mt-3">"The best time to plant a tree was 20 years ago. The second best time is now."</h3>
          <p class="mt-4 text-white-50">— Chinese Proverb</p>
          <hr class="my-4 border-white-50">
          <p class="small text-white">Join 5,000+ property managers who trust ArborPro for their urban canopy needs.</p>
        </div>
      </div>
    </div>
  </div>

  <button class="back-to-top" id="backToTop" aria-label="Back to top"><i class="bi bi-chevron-up"></i></button>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
